name: run-tests

on:
  push:
    branches:
    tags:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [8.4, 8.5]
        laravel: ['11.*', '12.*']
        include:
          - laravel: '11.*'
            testbench: '9.*'
          - laravel: '12.*'
            testbench: '10.*'

    name: P${{ matrix.php }} - L${{ matrix.laravel }}

    steps:
      - uses: actions/checkout@v4

      - name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: curl, mbstring, xdebug
          coverage: xdebug
          tools: composer

      - name: Show PHP version
        run: php -v && composer -V

      - name: Install dependencies
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" --no-update --no-interaction
          composer require --dev "orchestra/testbench:${{ matrix.testbench }}" --no-update --no-interaction
          composer update --prefer-dist --no-interaction

      - name: Run tests
        run: ./vendor/bin/pest --parallel --coverage-clover coverage.xml

      - name: Check code style
        if: matrix.php == '8.4' && matrix.laravel == '12.*'
        run: ./vendor/bin/pint --test

      - name: Run PHPStan
        if: matrix.php == '8.4' && matrix.laravel == '12.*'
        run: ./vendor/bin/phpstan analyse --no-progress

      - uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
